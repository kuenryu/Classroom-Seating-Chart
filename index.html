<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧教室座位表生成器</title>
    
    <!-- 引入 Tailwind CSS (UI 設計) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome (圖示) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 SheetJS (Excel 處理) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- 引入 html2canvas (圖片下載) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- 引入 SweetAlert2 (提示視窗) -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }

        /* 座位卡片樣式 */
        .seat-card {
            transition: all 0.2s ease;
            user-select: none;
        }
        .seat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .seat-card.dragging {
            opacity: 0.5;
            border: 2px dashed #3b82f6;
        }

        /* 視角切換動畫 */
        #classroom-area {
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            transform-origin: center center;
            display: flex;
            flex-direction: column;
        }
        
        /* 標題區域動畫 */
        #info-header {
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* --- 老師視角 (預設狀態) --- */
        #classroom-area:not(.student-view-mode) #info-header {
            transform: rotate(0deg);
        }
        
        /* --- 學生視角 (Student View Mode) --- */
        .student-view-mode {
            transform: rotate(180deg);
        }
        
        .student-view-mode #info-header,
        .student-view-mode .seat-content, 
        .student-view-mode .teacher-desk-text {
            transform: rotate(-180deg);
        }

        /* --- Markdown 風格列印區 (預設隱藏) --- */
        #markdown-print-view {
            display: none;
        }

        /* --- 列印專用設定 --- */
        @media print {
            @page { 
                size: A4 portrait; 
                margin: 10mm; /* 縮小邊距以容納更多內容 */
            }
            
            /* 隱藏所有網頁介面 */
            body * {
                visibility: hidden;
            }
            
            /* 只顯示 Markdown 列印區 */
            #markdown-print-view, #markdown-print-view * {
                visibility: visible;
            }

            body, main {
                overflow: visible !important;
                height: auto !important;
                background-color: white;
            }

            #markdown-print-view {
                display: flex; /* 使用 Flex 佈局 */
                flex-direction: column;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 98vh; /* 強制佔滿頁面高度 */
                background: white;
                color: black;
                font-family: 'Noto Sans TC', serif; 
                justify-content: flex-start;
                align-items: center;
            }

            /* 模擬 Markdown 排版樣式 */
            .md-h1 {
                font-size: 22pt;
                font-weight: bold;
                text-align: center;
                margin-bottom: 2mm;
                border-bottom: 2px solid #000;
                width: 100%;
                padding-bottom: 2mm;
            }

            .md-meta {
                font-size: 11pt;
                margin-bottom: 5mm;
                line-height: 1.4;
                text-align: center;
                width: 100%;
            }

            /* 表格樣式 (模擬 Markdown Table) */
            .md-table {
                width: 100%;
                border-collapse: collapse;
                /* margin-bottom: 5mm; */
                table-layout: fixed; 
                flex-grow: 1; /* 讓表格佔據剩餘空間 */
            }

            .md-table th, .md-table td {
                border: 1px solid #000;
                padding: 1mm;
                text-align: center;
                vertical-align: middle;
                overflow: hidden; /* 防止內容撐開 */
            }

            /* 內容字體 */
            .md-seat-id {
                font-size: 10pt;
                font-weight: bold;
                display: block;
            }

            .md-seat-name {
                font-size: 12pt;
                display: block;
                white-space: nowrap; /* 避免換行太亂 */
                overflow: hidden;
                text-overflow: ellipsis; 
            }

            .md-empty {
                color: #ddd;
                font-size: 9pt;
            }

            /* 講台區塊 */
            .md-desk {
                border: 2px solid #000;
                text-align: center;
                padding: 3mm;
                margin-top: 5mm;
                width: 60%;
                font-weight: bold;
                background-color: #f0f0f0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                flex-shrink: 0; /* 防止被壓縮 */
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- 隱藏的 Markdown 風格列印區 -->
    <div id="markdown-print-view">
        <!-- 內容將由 JS 動態生成 -->
    </div>

    <!-- 左側控制面板 (無列印) -->
    <aside class="w-full md:w-1/4 bg-white shadow-lg overflow-y-auto z-20 no-print flex flex-col border-r border-gray-200">
        <div class="p-5 bg-blue-600 text-white">
            <h1 class="text-xl font-bold"><i class="fa-solid fa-graduation-cap mr-2"></i>座位表生成器</h1>
            <p class="text-xs opacity-80 mt-1">拖拉交換 • 智慧排位 • Excel 匯出</p>
        </div>

        <div class="p-4 space-y-6 flex-1">
            
            <!-- 1. 基本設定 -->
            <div class="space-y-3">
                <h3 class="font-bold text-gray-700 border-b pb-1">1. 基本資訊與名單</h3>
                
                <!-- 學年度與學期輸入 -->
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="schoolYear" placeholder="學年度 (如: 113)" class="border p-2 rounded text-sm w-full">
                    <select id="semester" class="border p-2 rounded text-sm w-full bg-white text-gray-700">
                        <option value="上學期">上學期</option>
                        <option value="下學期">下學期</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="className" placeholder="班級名稱 (如: 7年3班)" class="border p-2 rounded text-sm w-full">
                    <input type="text" id="teacherName" placeholder="老師姓名" class="border p-2 rounded text-sm w-full">
                </div>
                
                <div class="flex gap-2">
                    <label class="flex-1 cursor-pointer bg-green-50 text-green-700 border border-green-200 hover:bg-green-100 p-2 rounded text-center text-sm transition">
                        <i class="fa-solid fa-file-excel mr-1"></i> 匯入 Excel
                        <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden">
                    </label>
                </div>

                <textarea id="studentInput" rows="5" placeholder="在此貼上名單...&#10;格式範例：&#10;1 王小明&#10;2 李大同&#10;3 陳美麗" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-blue-300 outline-none"></textarea>
                <div class="text-xs text-gray-500 text-right">目前人數: <span id="studentCount">0</span> 人</div>
            </div>

            <!-- 2. 版面設定 (直列在前，橫排在後) -->
            <div class="space-y-3">
                <h3 class="font-bold text-gray-700 border-b pb-1">2. 教室格局</h3>
                <div class="grid grid-cols-2 gap-4">
                    <!-- 直列 (Cols) -->
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">直列 (Cols)</label>
                        <input type="number" id="colsInput" value="6" min="1" max="15" class="border p-2 rounded w-full">
                    </div>
                    <!-- 橫排 (Rows) -->
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">橫排 (Rows)</label>
                        <input type="number" id="rowsInput" value="6" min="1" max="15" class="border p-2 rounded w-full">
                    </div>
                </div>
                <button onclick="updateGridDimensions()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-1 rounded text-sm transition">重設網格</button>
            </div>

            <!-- 3. 排位條件 -->
            <div class="space-y-3">
                <h3 class="font-bold text-gray-700 border-b pb-1">3. 排位限制條件 (選填)</h3>
                
                <div>
                    <label class="text-xs font-semibold text-blue-600 block mb-1">一定要坐第一排 (輸入座號，逗號隔開)</label>
                    <input type="text" id="fixedFrontInput" placeholder="例: 1, 5, 12" class="border p-2 rounded text-sm w-full">
                </div>

                <div>
                    <label class="text-xs font-semibold text-red-600 block mb-1">不可坐在一起 (輸入座號組，分號隔開)</label>
                    <input type="text" id="separateInput" placeholder="例: 1,2; 5,8 (1和2分開, 5和8分開)" class="border p-2 rounded text-sm w-full">
                </div>

                <div>
                    <label class="text-xs font-semibold text-green-600 block mb-1">必須坐在一起 (輸入座號組，分號隔開)</label>
                    <input type="text" id="pairInput" placeholder="例: 3,4; 9,10" class="border p-2 rounded text-sm w-full">
                </div>
            </div>

            <!-- 4. 操作按鈕 -->
            <div class="pt-4 space-y-2">
                <button onclick="generateRandomSeat()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg shadow font-bold text-lg transition flex items-center justify-center">
                    <i class="fa-solid fa-shuffle mr-2"></i> 隨機分配座位
                </button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="clearSeats()" class="bg-red-50 text-red-600 border border-red-200 py-2 rounded text-sm hover:bg-red-100">清空座位</button>
                    <button onclick="fillSeatsInOrder()" class="bg-gray-50 text-gray-600 border border-gray-200 py-2 rounded text-sm hover:bg-gray-100">依序入座</button>
                </div>
            </div>
        </div>
    </aside>

    <!-- 右側顯示區 -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-gray-100 relative">
        
        <!-- 頂部工具列 -->
        <header class="bg-white shadow-sm p-3 px-6 flex justify-between items-center z-10 no-print">
            <div class="flex items-center gap-4">
                <div class="flex items-center bg-gray-100 rounded-lg p-1">
                    <button onclick="setView('teacher')" id="btn-teacher-view" class="px-3 py-1.5 rounded-md text-sm font-medium bg-white shadow text-blue-600 transition">老師視角</button>
                    <button onclick="setView('student')" id="btn-student-view" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition">學生視角</button>
                </div>
                <div class="text-sm text-gray-500 hidden md:block">
                    <i class="fa-regular fa-lightbulb mr-1"></i> 提示: 可直接拖曳座位交換位置
                </div>
            </div>

            <div class="flex gap-2">
                <button onclick="downloadImage()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-2 rounded text-sm transition">
                    <i class="fa-solid fa-image mr-1"></i> 存成圖片
                </button>
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded text-sm transition">
                    <i class="fa-solid fa-file-excel mr-1"></i> 存成 Excel
                </button>
                <button onclick="printAsMarkdown()" class="bg-gray-700 hover:bg-gray-800 text-white px-3 py-2 rounded text-sm transition">
                    <i class="fa-solid fa-print mr-1"></i> 列印
                </button>
            </div>
        </header>

        <!-- 座位表畫布 -->
        <div id="print-area" class="flex-1 overflow-auto p-4 md:p-8 flex flex-col items-center justify-center">
            
            <div id="classroom-area" class="relative bg-white shadow-2xl rounded-xl p-8 border border-gray-200 max-w-full">
                
                <!-- 座位網格 (最上方) -->
                <div id="seat-grid" class="grid gap-4 mx-auto mb-10">
                    <!-- Javascript will populate this -->
                </div>

                <!-- 講台 (Teacher Desk) - 移到底部 -->
                <div class="w-full flex justify-center mt-auto teacher-desk-container">
                    <div class="teacher-desk w-64 h-16 bg-amber-200 rounded-lg border-2 border-amber-300 flex items-center justify-center shadow-md relative">
                        <span class="teacher-desk-text font-bold text-amber-800 text-lg">
                            講台 / 黑板
                        </span>
                        <!-- 裝飾箭頭 (調整為指向座位網格) -->
                        <div class="absolute -top-2 w-full flex justify-center">
                            <div class="w-4 h-4 bg-amber-300 rotate-45"></div>
                        </div>
                    </div>
                </div>

                <!-- 標題區 (移到最下方，並調整 margin) -->
                <div id="info-header" class="text-center mt-8">
                    <!-- 學年度與學期顯示 -->
                    <h3 class="text-xl font-medium text-gray-600 mb-1 tracking-wide">
                        <span id="displaySchoolYear"></span> 學年度 <span id="displaySemester">上學期</span>
                    </h3>
                    <h2 class="text-3xl font-bold text-gray-800 tracking-wide" id="displayClassName">班級座位表</h2>
                    <p class="text-gray-500 mt-1" id="displayTeacherName">導師：</p>
                    <p class="text-xs text-gray-400 mt-1">產生時間: <span id="timestamp"></span></p>
                </div>

            </div>
        </div>
    </main>

<script>
    // --- 狀態變數 ---
    let students = []; // { id: "1", name: "王小明" }
    let gridRows = 6;
    let gridCols = 6;
    let currentMapping = []; // index -> student object or null
    let draggedIndex = null;

    // --- 初始化 ---
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('timestamp').textContent = today;
        updateGridDimensions();
        
        // 監聽輸入框變化
        const updateHeader = () => {
            const y = document.getElementById('schoolYear').value || '___';
            document.getElementById('displaySchoolYear').textContent = y;
            document.getElementById('displaySemester').textContent = document.getElementById('semester').value;
        };

        document.getElementById('schoolYear').addEventListener('input', updateHeader);
        document.getElementById('semester').addEventListener('change', updateHeader);

        // 初始化顯示一次
        updateHeader();

        document.getElementById('className').addEventListener('input', (e) => {
            document.getElementById('displayClassName').textContent = e.target.value || '班級座位表';
        });
        document.getElementById('teacherName').addEventListener('input', (e) => {
            document.getElementById('displayTeacherName').textContent = '導師：' + e.target.value;
        });
        document.getElementById('studentInput').addEventListener('input', parseStudentInput);
        document.getElementById('excelInput').addEventListener('change', handleExcelUpload);
    });

    // --- 核心功能 1: 資料處理 ---

    function parseStudentInput() {
        const text = document.getElementById('studentInput').value;
        const lines = text.split('\n');
        students = [];
        
        lines.forEach(line => {
            const trimmed = line.trim();
            if (trimmed) {
                // 嘗試解析 "座號 姓名" 或只是 "姓名"
                // 簡單正則：開頭數字視為座號
                const match = trimmed.match(/^(\d+)[.\s\t]+(.+)$/);
                if (match) {
                    students.push({ id: match[1], name: match[2].trim() });
                } else {
                    // 如果沒有座號，自動生成臨時座號或是純姓名
                    students.push({ id: '', name: trimmed });
                }
            }
        });

        document.getElementById('studentCount').textContent = students.length;
    }

    function handleExcelUpload(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const json = XLSX.utils.sheet_to_json(worksheet, {header: 1}); // 陣列陣列格式

            let newStudents = [];
            // 假設 Excel 第一行是標題，從第二行開始
            // 嘗試偵測格式：[座號, 姓名]
            for(let i = 0; i < json.length; i++) {
                const row = json[i];
                if(row.length >= 2) {
                    // 簡單判斷：如果第一欄是數字，第二欄是字串
                    if(!isNaN(row[0]) && row[1]) {
                        newStudents.push({ id: row[0], name: row[1] });
                    } 
                    // 或是有些表頭可能是 "座號", "姓名"，忽略表頭
                    else if (i > 0 && row[0] && row[1]) {
                        newStudents.push({ id: row[0], name: row[1] });
                    }
                }
            }

            if(newStudents.length > 0) {
                students = newStudents;
                // 反向填回 textarea
                const text = students.map(s => `${s.id} ${s.name}`).join('\n');
                document.getElementById('studentInput').value = text;
                document.getElementById('studentCount').textContent = students.length;
                Swal.fire('匯入成功', `成功匯入 ${students.length} 筆資料`, 'success');
            } else {
                Swal.fire('格式錯誤', '無法識別 Excel 內容，請確認格式為：座號 | 姓名', 'error');
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // --- 核心功能 2: 網格生成與渲染 ---

    function updateGridDimensions() {
        gridRows = parseInt(document.getElementById('rowsInput').value) || 6;
        gridCols = parseInt(document.getElementById('colsInput').value) || 6;
        
        const grid = document.getElementById('seat-grid');
        grid.style.gridTemplateColumns = `repeat(${gridCols}, minmax(60px, 1fr))`;
        
        // 重置當前映射並重新渲染空位
        // 如果想保留目前座位，需要做較複雜的 mapping 轉換，這裡簡單處理：清空或重新依序
        renderSeats();
    }

    function renderSeats() {
        const grid = document.getElementById('seat-grid');
        grid.innerHTML = '';
        
        const totalSeats = gridRows * gridCols;

        // 確保 currentMapping 長度正確
        if (currentMapping.length !== totalSeats) {
             // 調整陣列大小，保留舊資料
             const newMapping = new Array(totalSeats).fill(null);
             for(let i=0; i<Math.min(currentMapping.length, totalSeats); i++) {
                 newMapping[i] = currentMapping[i];
             }
             currentMapping = newMapping;
        }

        for (let i = 0; i < totalSeats; i++) {
            const student = currentMapping[i];
            const seatDiv = document.createElement('div');
            
            // 計算排與列 (用於顯示或邏輯)
            const row = Math.floor(i / gridCols) + 1;
            const col = (i % gridCols) + 1;

            seatDiv.className = `seat-card relative bg-white border-2 ${student ? 'border-blue-300' : 'border-dashed border-gray-300'} rounded-lg p-1 h-20 md:h-24 flex flex-col items-center justify-center cursor-move`;
            seatDiv.draggable = true;
            seatDiv.dataset.index = i;

            // 拖曳事件
            seatDiv.addEventListener('dragstart', handleDragStart);
            seatDiv.addEventListener('dragover', handleDragOver);
            seatDiv.addEventListener('drop', handleDrop);
            seatDiv.addEventListener('dragenter', handleDragEnter);
            seatDiv.addEventListener('dragleave', handleDragLeave);
            
            if (student) {
                seatDiv.innerHTML = `
                    <div class="seat-content text-center w-full overflow-hidden">
                        <div class="text-[10px] md:text-xs font-bold text-gray-500 mb-0.5 leading-none">${student.id || ''}</div>
                        <div class="text-sm md:text-base font-bold text-gray-800 truncate px-0.5 leading-tight">${student.name}</div>
                    </div>
                `;
                seatDiv.style.backgroundColor = '#f0f9ff'; // 淺藍底
            } else {
                seatDiv.innerHTML = `
                    <div class="seat-content text-center text-gray-300 select-none">
                        <i class="fa-solid fa-chair text-lg md:text-2xl mb-1"></i>
                        <div class="text-[10px]">空位</div>
                    </div>
                `;
            }

            grid.appendChild(seatDiv);
        }
    }

    // --- 核心功能 3: 拖放邏輯 (HTML5 Drag & Drop) ---

    function handleDragStart(e) {
        draggedIndex = parseInt(this.dataset.index);
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
        e.preventDefault(); // 必要，允許 drop
        e.dataTransfer.dropEffect = 'move';
    }

    function handleDragEnter(e) {
        this.classList.add('bg-blue-100');
    }

    function handleDragLeave(e) {
        this.classList.remove('bg-blue-100');
    }

    function handleDrop(e) {
        e.stopPropagation();
        e.preventDefault();
        this.classList.remove('bg-blue-100');
        
        const targetIndex = parseInt(this.dataset.index);
        
        if (draggedIndex !== null && draggedIndex !== targetIndex) {
            // 交換資料陣列
            const temp = currentMapping[draggedIndex];
            currentMapping[draggedIndex] = currentMapping[targetIndex];
            currentMapping[targetIndex] = temp;
            
            // 重新渲染
            renderSeats();
        }
        
        // 清除樣式
        const draggingEl = document.querySelector('.dragging');
        if (draggingEl) draggingEl.classList.remove('dragging');
        draggedIndex = null;
    }


    // --- 核心功能 4: 演算法 (隨機與限制) ---

    // 輔助：解析字串 "1, 2, 3" 為陣列 ["1", "2", "3"]
    function parseIds(str) {
        if (!str) return [];
        return str.split(/[,;]/).map(s => s.trim()).filter(s => s !== "");
    }

    // 輔助：解析組 "1,2; 3,4" 為 [["1","2"], ["3","4"]]
    function parseGroups(str) {
        if (!str) return [];
        return str.split(';').map(group => {
            return group.split(',').map(s => s.trim()).filter(s => s !== "");
        }).filter(g => g.length > 1);
    }

    function fillSeatsInOrder() {
        if(students.length === 0) { parseStudentInput(); }
        if(students.length === 0) { Swal.fire('無資料', '請先輸入學生名單', 'warning'); return; }

        currentMapping = new Array(gridRows * gridCols).fill(null);
        
        let studentIdx = 0;
        // 外層迴圈：從最底層排 (最接近講台) 開始，往上 (後排) 填
        for (let r = gridRows - 1; r >= 0; r--) {
            // 內層迴圈：從左到右 (老師視角，即學生視角的右到左)
            for (let c = 0; c < gridCols; c++) {
                if (studentIdx < students.length) {
                    const domIndex = r * gridCols + c;
                    currentMapping[domIndex] = students[studentIdx];
                    studentIdx++;
                }
            }
        }
        
        renderSeats();
    }

    function clearSeats() {
        currentMapping = new Array(gridRows * gridCols).fill(null);
        renderSeats();
    }

    function generateRandomSeat() {
        if(students.length === 0) { parseStudentInput(); }
        if(students.length === 0) { Swal.fire('無資料', '請先輸入學生名單', 'warning'); return; }

        const totalSeats = gridRows * gridCols;
        if(students.length > totalSeats) {
            Swal.fire('座位不足', `學生 ${students.length} 人，座位僅 ${totalSeats} 個`, 'error');
            return;
        }

        // 讀取限制條件
        const fixedFrontIds = parseIds(document.getElementById('fixedFrontInput').value);
        const separateGroups = parseGroups(document.getElementById('separateInput').value);
        const pairGroups = parseGroups(document.getElementById('pairInput').value);

        // 準備池子
        let pool = [...students];
        
        // --- 階段 1: 處理「一定要坐第一排」 ---
        // 找出這些學生
        let frontRowStudents = [];
        let otherStudents = [];

        pool.forEach(s => {
            if (fixedFrontIds.includes(s.id)) {
                frontRowStudents.push(s);
            } else {
                otherStudents.push(s);
            }
        });

        // 隨機打亂這兩組
        shuffleArray(frontRowStudents);
        shuffleArray(otherStudents);

        // 定義優先順序索引表 (Priority Indices): 讓隨機分配也優先填滿前排 (黑板下方)
        // 順序：從最後一排(HTML index max)的左邊開始，往上(HTML index 0)填
        let priorityIndices = [];
        for (let r = gridRows - 1; r >= 0; r--) {
            for (let c = 0; c < gridCols; c++) {
                priorityIndices.push(r * gridCols + c);
            }
        }

        let layout = new Array(totalSeats).fill(null);
        let usedIndices = new Set();

        // 1. 填入「一定要坐第一排」的學生
        let frontSlotsNeeded = frontRowStudents.length;
        let frontSlots = priorityIndices.slice(0, frontSlotsNeeded); 
        
        for(let i=0; i<frontRowStudents.length; i++) {
            let slot = frontSlots[i]; 
            layout[slot] = frontRowStudents[i];
            usedIndices.add(slot);
        }

        // 2. 填入其餘學生 (otherStudents)
        let remainingSlotIndex = 0; // 用來遍歷 priorityIndices
        
        for(let i=0; i<otherStudents.length; i++) {
            while(usedIndices.has(priorityIndices[remainingSlotIndex])) {
                remainingSlotIndex++;
            }
            let slot = priorityIndices[remainingSlotIndex];
            layout[slot] = otherStudents[i];
            usedIndices.add(slot);
        }

        // --- 階段 2: 迭代優化 (處理 互斥 與 綁定) ---
        let bestLayout = [...layout];
        let minConflicts = calculateConflicts(layout, separateGroups, pairGroups);
        
        const MAX_ITERATIONS = 2000;
        
        for(let i=0; i<MAX_ITERATIONS; i++) {
            if (minConflicts === 0) break;

            let idx1 = Math.floor(Math.random() * totalSeats);
            let idx2 = Math.floor(Math.random() * totalSeats);

            let tempLayout = [...bestLayout];
            let temp = tempLayout[idx1];
            tempLayout[idx1] = tempLayout[idx2];
            tempLayout[idx2] = temp;

            let brokenHardConstraint = false;
            const isFixed = (s) => s && fixedFrontIds.includes(s.id);
            const isFrontRow = (idx) => Math.floor(idx / gridCols) === gridRows - 1;

            if (isFixed(tempLayout[idx1]) && !isFrontRow(idx1)) brokenHardConstraint = true;
            if (isFixed(tempLayout[idx2]) && !isFrontRow(idx2)) brokenHardConstraint = true;

            if (!brokenHardConstraint) {
                let conflicts = calculateConflicts(tempLayout, separateGroups, pairGroups);
                if (conflicts < minConflicts) {
                    minConflicts = conflicts;
                    bestLayout = tempLayout;
                } else if (conflicts === minConflicts && Math.random() > 0.5) {
                    bestLayout = tempLayout;
                }
            }
        }

        currentMapping = bestLayout;
        renderSeats();

        if (minConflicts > 0) {
            Swal.fire({
                title: '無法完美滿足所有條件',
                text: `經過運算後，仍有 ${minConflicts} 個規則衝突 (例如：應該分開的人坐在一起)。您可以再試按一次隨機分配。`,
                icon: 'warning'
            });
        } else {
            Swal.fire({
                title: '分配完成',
                text: '已滿足所有限制條件！',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
        }
    }

    // 計算衝突分數 (越低越好)
    function calculateConflicts(layout, separateGroups, pairGroups) {
        let score = 0;
        let posMap = {};
        layout.forEach((s, idx) => {
            if(s) posMap[s.id] = idx;
        });

        separateGroups.forEach(group => {
            for(let i=0; i<group.length; i++) {
                for(let j=i+1; j<group.length; j++) {
                    let id1 = group[i];
                    let id2 = group[j];
                    if(posMap[id1] !== undefined && posMap[id2] !== undefined) {
                        if (isAdjacent(posMap[id1], posMap[id2])) {
                            score++; 
                        }
                    }
                }
            }
        });

        pairGroups.forEach(group => {
            if (group.length === 2) {
                let p1 = posMap[group[0]];
                let p2 = posMap[group[1]];
                if (p1 !== undefined && p2 !== undefined) {
                    if (!isAdjacent(p1, p2)) {
                        score++; 
                    }
                }
            } else if (group.length > 2) {
                 for(let i=0; i<group.length; i++) {
                    let p1 = posMap[group[i]];
                    if (p1 === undefined) continue;
                    let hasFriend = false;
                    for(let j=0; j<group.length; j++) {
                        if(i===j) continue;
                        let p2 = posMap[group[j]];
                        if (p2 !== undefined && isAdjacent(p1, p2)) {
                            hasFriend = true;
                            break;
                        }
                    }
                    if(!hasFriend) score++; 
                }
            }
        });

        return score;
    }

    // 判斷兩個 index 是否相鄰 (左右或前後)
    function isAdjacent(idx1, idx2) {
        let r1 = Math.floor(idx1 / gridCols);
        let c1 = idx1 % gridCols;
        let r2 = Math.floor(idx2 / gridCols);
        let c2 = idx2 % gridCols;

        if (r1 === r2 && Math.abs(c1 - c2) === 1) return true;
        
        return false;
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // --- 核心功能 5: 視角切換 ---

    function setView(view) {
        const area = document.getElementById('classroom-area');
        const btnT = document.getElementById('btn-teacher-view');
        const btnS = document.getElementById('btn-student-view');

        if (view === 'teacher') {
            area.classList.remove('student-view-mode');
            btnT.className = "px-3 py-1.5 rounded-md text-sm font-medium bg-white shadow text-blue-600 transition";
            btnS.className = "px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition";
        } else {
            area.classList.add('student-view-mode');
            btnS.className = "px-3 py-1.5 rounded-md text-sm font-medium bg-white shadow text-blue-600 transition";
            btnT.className = "px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-gray-700 transition";
        }
    }

    // --- 核心功能 6: 匯出與列印 ---

    function downloadImage() {
        const element = document.getElementById('classroom-area');
        Swal.fire({
            title: '生成圖片中...',
            text: '請稍候',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading() }
        });

        html2canvas(element, {
            scale: 2, 
            backgroundColor: '#ffffff'
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `座位表_${document.getElementById('className').value || 'Class'}.png`;
            link.href = canvas.toDataURL();
            link.click();
            Swal.close();
        }).catch(err => {
            Swal.fire('錯誤', '圖片生成失敗', 'error');
            console.error(err);
        });
    }

    function exportToExcel() {
        const data = [];
        const year = document.getElementById('schoolYear').value || '';
        const sem = document.getElementById('semester').value;
        if(year) {
            data.push([`${year} 學年度 ${sem}`]);
        } else {
            data.push([`${sem}`]);
        }
        data.push([document.getElementById('className').value || '班級座位表']);
        data.push(['導師', document.getElementById('teacherName').value]);
        data.push([]); 

        for(let r=0; r<gridRows; r++) {
            let rowData = [];
            for(let c=0; c<gridCols; c++) {
                const idx = r * gridCols + c;
                const student = currentMapping[idx];
                if(student) {
                    rowData.push(`${student.id} ${student.name}`);
                } else {
                    rowData.push("空位");
                }
            }
            data.push(rowData);
        }

        const ws = XLSX.utils.aoa_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "座位表");
        XLSX.writeFile(wb, `座位表_${document.getElementById('className').value || 'Class'}.xlsx`);
    }

    // --- Markdown 風格列印功能 ---
    function printAsMarkdown() {
        // 1. 取得資料
        const schoolYear = document.getElementById('schoolYear').value || '';
        const semester = document.getElementById('semester').value;
        const className = document.getElementById('className').value || '班級座位表';
        const teacherName = document.getElementById('teacherName').value || '';
        const timeStr = document.getElementById('timestamp').textContent;

        const container = document.getElementById('markdown-print-view');
        
        // 2. 建構 HTML 字串 (模擬 Markdown 渲染結果)
        let html = '';
        
        // 標題 (H1)
        html += `<div class="md-h1">${className}</div>`;
        
        // 資訊列表
        html += `<div class="md-meta">`;
        if(schoolYear) html += `<strong>${schoolYear} 學年度 ${semester}</strong><br>`;
        html += `導師：${teacherName || '未指定'}<br>`;
        html += `<span style="font-size: 10pt; color: #666;">製表日期：${timeStr}</span>`;
        html += `</div>`;

        // 表格 (Table)
        html += `<table class="md-table">`;
        
        // 計算行高百分比，確保填滿畫面
        // 預留約 20% 給標題和講台，剩下 80% 給表格
        // 但如果有太多排，還是讓它自然延伸比較好，這裡我們用 min-height 確保不要太擠
        // 為了確保不被裁切，我們可以計算每列的建議高度
        const pageHeightAvailableMM = 220; // A4 約 297mm，扣除邊距標題剩下約 220
        const rowHeightMM = Math.max(15, Math.floor(pageHeightAvailableMM / gridRows)); 
        
        for(let r=0; r<gridRows; r++) {
            html += `<tr>`;
            for(let c=0; c<gridCols; c++) {
                const idx = r * gridCols + c;
                const student = currentMapping[idx];
                // 加入 style 設定高度
                html += `<td style="height: ${rowHeightMM}mm">`;
                if(student) {
                    html += `<span class="md-seat-id">${student.id}</span>`;
                    html += `<span class="md-seat-name">${student.name}</span>`;
                } else {
                    html += `<span class="md-empty">空位</span>`;
                }
                html += `</td>`;
            }
            html += `</tr>`;
        }
        html += `</table>`;

        // 講台區
        html += `<div class="md-desk">講台 / 黑板</div>`;

        // 3. 寫入並列印
        container.innerHTML = html;
        window.print();
    }

</script>
